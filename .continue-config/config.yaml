# ~/.continue/config.yaml
# Continue — GitHub Copilot and Oracle Code Assist (OCA) paid models.
#
# Both providers talk directly to their APIs — no local proxy, no daemon.
#
# ═══════════════════════════════════════════════════════════════════════════
#  ONE-TIME SETUP
# ═══════════════════════════════════════════════════════════════════════════
#
#  ── GitHub Copilot ─────────────────────────────────────────────────────────
#  1. Install the VS Code extension (once):
#       cd ~/Documents/codex-oca-tool && bash install.sh --copilot-setup
#  2. Run from the VS Code Command Palette (once):
#       Codex Copilot: Export Token and Enable
#     This writes ~/.codex/copilot-auth.json.
#     Continue reads and auto-refreshes the bearer token at runtime.
#
#  ── Oracle Code Assist ─────────────────────────────────────────────────────
#  3. Log in to OCA (once):
#       bash ~/Documents/codex-oca-tool/codex-oca-temp.sh login
#     This writes ~/.codex/oca-secrets.json.
#
#  ── Install this config ────────────────────────────────────────────────────
#  4. Run:
#       bash ~/Documents/continue/scripts/setup-continue-providers.sh
#
# ═══════════════════════════════════════════════════════════════════════════
#  TOKEN REFRESH
# ═══════════════════════════════════════════════════════════════════════════
#
#  Copilot: automatic — Continue refreshes the bearer via GitHub OAuth token.
#  OCA (when expired):
#    bash ~/Documents/codex-oca-tool/codex-oca-temp.sh refresh
#    bash ~/Documents/continue/scripts/setup-continue-providers.sh --env-only
#    VS Code → Developer: Reload Window
#
# ═══════════════════════════════════════════════════════════════════════════
#  ROUTING NOTES (from docs/copilot-direct-api.md)
# ═══════════════════════════════════════════════════════════════════════════
#
#  GPT models → /chat/completions (all work here; /responses for some)
#  Claude models → /chat/completions ONLY (do not support /responses)
#  Gemini models → /chat/completions ONLY
# ═══════════════════════════════════════════════════════════════════════════

name: Continue with GitHub Copilot and OCA
version: 1.0.0
schema: v1

models:

  # ════════════════════════════════════════════════════════════════════════
  # GitHub Copilot models  (provider: github-copilot)
  # Token: auto-refreshed from ~/.codex/copilot-auth.json at runtime.
  # No apiKey needed in config.
  # ════════════════════════════════════════════════════════════════════════

  # ── GPT-5 series ──────────────────────────────────────────────────────────

  - name: "Copilot: gpt-5.3-codex"
    provider: github-copilot
    model: gpt-5.3-codex
    apiBase: https://api.githubcopilot.com/
    roles: [chat, edit, apply]
    capabilities: [tool_use, image_input]

  - name: "Copilot: gpt-5.5"
    provider: github-copilot
    model: gpt-5.5
    apiBase: https://api.githubcopilot.com/
    roles: [chat, edit, apply]
    capabilities: [tool_use, image_input]

  - name: "Copilot: gpt-5.4"
    provider: github-copilot
    model: gpt-5.4
    apiBase: https://api.githubcopilot.com/
    roles: [chat, edit, apply, summarize]
    capabilities: [tool_use, image_input]

  - name: "Copilot: gpt-5.4-mini"
    provider: github-copilot
    model: gpt-5.4-mini
    apiBase: https://api.githubcopilot.com/
    roles: [chat, edit, apply, subagent]
    capabilities: [tool_use, image_input]

  - name: "Copilot: gpt-5-mini"
    provider: github-copilot
    model: gpt-5-mini
    apiBase: https://api.githubcopilot.com/
    roles: [chat, edit, apply, subagent]
    capabilities: [tool_use, image_input]

  # ── GPT-4 series ──────────────────────────────────────────────────────────

  - name: "Copilot: gpt-4.1"
    provider: github-copilot
    model: gpt-4.1
    apiBase: https://api.githubcopilot.com/
    roles: [chat, edit, apply, summarize]
    capabilities: [tool_use, image_input]

  - name: "Copilot: gpt-4o"
    provider: github-copilot
    model: gpt-4o
    apiBase: https://api.githubcopilot.com/
    roles: [chat, edit, apply, summarize]
    capabilities: [tool_use, image_input]

  - name: "Copilot: gpt-4o-mini"
    provider: github-copilot
    model: gpt-4o-mini
    apiBase: https://api.githubcopilot.com/
    roles: [chat, edit, apply, subagent]
    capabilities: [tool_use, image_input]

  # ── Reasoning ─────────────────────────────────────────────────────────────

  - name: "Copilot: o3"
    provider: github-copilot
    model: o3
    apiBase: https://api.githubcopilot.com/
    roles: [chat]
    capabilities: [tool_use]

  # ── Claude series (chat/completions only per copilot-direct-api.md) ───────

  - name: "Copilot: claude-sonnet-4.6"
    provider: github-copilot
    model: claude-sonnet-4.6
    apiBase: https://api.githubcopilot.com/
    roles: [chat, edit, apply]
    capabilities: [tool_use]

  - name: "Copilot: claude-sonnet-4.5"
    provider: github-copilot
    model: claude-sonnet-4.5
    apiBase: https://api.githubcopilot.com/
    roles: [chat, edit, apply]
    capabilities: [tool_use]

  - name: "Copilot: claude-opus-4.6"
    provider: github-copilot
    model: claude-opus-4.6
    apiBase: https://api.githubcopilot.com/
    roles: [chat, edit, apply]
    capabilities: [tool_use]

  - name: "Copilot: claude-opus-4.5"
    provider: github-copilot
    model: claude-opus-4.5
    apiBase: https://api.githubcopilot.com/
    roles: [chat, edit, apply]
    capabilities: [tool_use]

  - name: "Copilot: claude-haiku-4.5"
    provider: github-copilot
    model: claude-haiku-4.5
    apiBase: https://api.githubcopilot.com/
    roles: [chat, edit, apply, subagent]
    capabilities: [tool_use]

  # ── Gemini ─────────────────────────────────────────────────────────────────

  - name: "Copilot: gemini-2.5-pro"
    provider: github-copilot
    model: gemini-2.5-pro
    apiBase: https://api.githubcopilot.com/
    roles: [chat, edit, apply]
    capabilities: [tool_use, image_input]

  # ── Autocomplete (low-latency inline completions) ──────────────────────────

  - name: "Copilot Autocomplete"
    provider: github-copilot
    model: gpt-4o-mini
    apiBase: https://api.githubcopilot.com/
    roles: [autocomplete]

  # ════════════════════════════════════════════════════════════════════════
  # Oracle Code Assist (OCA) models  (provider: oca)
  # Token: auto-read from ~/.codex/oca-secrets.json at runtime.
  # No apiKey needed in config.
  # ════════════════════════════════════════════════════════════════════════

  - name: "OCA: gpt-5.3-codex"
    provider: oca
    model: oca/gpt-5.3-codex
    apiBase: https://code-internal.aiservice.us-chicago-1.oci.oraclecloud.com/20250206/app/litellm/v1/
    roles: [chat, edit, apply]
    capabilities: [tool_use]

  - name: "OCA: gpt-4.1"
    provider: oca
    model: oca/gpt-4.1
    apiBase: https://code-internal.aiservice.us-chicago-1.oci.oraclecloud.com/20250206/app/litellm/v1/
    roles: [chat, edit, apply, summarize]
    capabilities: [tool_use]

  - name: "OCA: gpt-4o"
    provider: oca
    model: oca/gpt-4o
    apiBase: https://code-internal.aiservice.us-chicago-1.oci.oraclecloud.com/20250206/app/litellm/v1/
    roles: [chat, edit, apply]
    capabilities: [tool_use]

  - name: "OCA Autocomplete"
    provider: oca
    model: oca/gpt-4o-mini
    apiBase: https://code-internal.aiservice.us-chicago-1.oci.oraclecloud.com/20250206/app/litellm/v1/
    roles: [autocomplete]

# ─── Context providers ────────────────────────────────────────────────────────
context:
  - provider: code
  - provider: docs
  - provider: diff
  - provider: terminal
  - provider: problems
  - provider: folder
  - provider: codebase

# ─── Rules ────────────────────────────────────────────────────────────────────
rules:
  - You are a precise software engineering assistant. Think carefully before making changes.
  - Prefer minimal, targeted edits. Always explain your reasoning concisely.
  - When using tools, be explicit about which file and line you are editing.

# ─── Env var injection ────────────────────────────────────────────────────────
env:
  - OCA_API_KEY

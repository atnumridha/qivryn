# ~/.continue/config.yaml
# Continue — GitHub Copilot and Oracle Code Assist (OCA) paid models.
#
# Both providers talk directly to their APIs — no local proxy, no daemon.
#
# ═══════════════════════════════════════════════════════════════════════════
#  ONE-TIME SETUP
# ═══════════════════════════════════════════════════════════════════════════
#
#  ── GitHub Copilot ─────────────────────────────────────────────────────────
#  1. Install the VS Code extension (once):
#       cd ~/Documents/codex-oca-tool && bash install.sh --copilot-setup
#  2. Run from the VS Code Command Palette (once):
#       Codex Copilot: Export Token and Enable
#     This writes ~/.codex/copilot-auth.json.
#     Continue reads and auto-refreshes this file at runtime — no proxy needed.
#
#  ── Oracle Code Assist ─────────────────────────────────────────────────────
#  3. Log in to OCA (once):
#       bash ~/Documents/codex-oca-tool/codex-oca-temp.sh login
#     This writes ~/.codex/oca-secrets.json.
#     Continue reads the JWT token from this file at runtime.
#
#  ── Install this config ────────────────────────────────────────────────────
#  4. Run:
#       bash ~/Documents/continue/scripts/setup-continue-providers.sh
#
# ═══════════════════════════════════════════════════════════════════════════
#  TOKEN REFRESH
# ═══════════════════════════════════════════════════════════════════════════
#
#  Copilot: automatic — Continue refreshes the bearer token itself.
#  OCA (when expired):
#    bash ~/Documents/codex-oca-tool/codex-oca-temp.sh refresh
#    # Then reload VS Code: Developer → Reload Window
# ═══════════════════════════════════════════════════════════════════════════

name: Continue with GitHub Copilot and OCA
version: 1.0.0
schema: v1

# ─── GitHub Copilot models ──────────────────────────────────────────────────
# provider: github-copilot
#   Talks directly to api.githubcopilot.com using the bearer token from
#   ~/.codex/copilot-auth.json.  No apiKey needed — the provider reads and
#   auto-refreshes it from the auth file.
#
# apiBase: the Copilot CAPI endpoint — resolved dynamically from the auth file
#   after the first token refresh.  The static default below works for most
#   accounts; it will be overridden by the endpoints.api field in the auth file.
models:

  # ── gpt-5.3-codex (default — best for agent & code tasks) ─────────────────
  - name: "Copilot: gpt-5.3-codex"
    provider: github-copilot
    model: gpt-5.3-codex
    apiBase: https://api.githubcopilot.com/
    roles:
      - chat
      - edit
      - apply
    capabilities:
      - tool_use
      - image_input

  # ── gpt-4.1 (strong reasoning + long context) ─────────────────────────────
  - name: "Copilot: gpt-4.1"
    provider: github-copilot
    model: gpt-4.1
    apiBase: https://api.githubcopilot.com/
    roles:
      - chat
      - edit
      - apply
      - summarize
    capabilities:
      - tool_use
      - image_input

  # ── gpt-4o ────────────────────────────────────────────────────────────────
  - name: "Copilot: gpt-4o"
    provider: github-copilot
    model: gpt-4o
    apiBase: https://api.githubcopilot.com/
    roles:
      - chat
      - edit
      - apply
      - summarize
    capabilities:
      - tool_use
      - image_input

  # ── gpt-4o-mini (fast, low-cost) ─────────────────────────────────────────
  - name: "Copilot: gpt-4o-mini"
    provider: github-copilot
    model: gpt-4o-mini
    apiBase: https://api.githubcopilot.com/
    roles:
      - chat
      - edit
      - apply
      - subagent
    capabilities:
      - tool_use
      - image_input

  # ── o3 (extended reasoning) ───────────────────────────────────────────────
  - name: "Copilot: o3"
    provider: github-copilot
    model: o3
    apiBase: https://api.githubcopilot.com/
    roles:
      - chat
    capabilities:
      - tool_use

  # ── claude-sonnet-4.5 ────────────────────────────────────────────────────
  - name: "Copilot: claude-sonnet-4.5"
    provider: github-copilot
    model: claude-sonnet-4.5
    apiBase: https://api.githubcopilot.com/
    roles:
      - chat
      - edit
      - apply
    capabilities:
      - tool_use

  # ── claude-sonnet-4.6 ────────────────────────────────────────────────────
  - name: "Copilot: claude-sonnet-4.6"
    provider: github-copilot
    model: claude-sonnet-4.6
    apiBase: https://api.githubcopilot.com/
    roles:
      - chat
      - edit
      - apply
    capabilities:
      - tool_use

  # ── gemini-2.5-pro ───────────────────────────────────────────────────────
  - name: "Copilot: gemini-2.5-pro"
    provider: github-copilot
    model: gemini-2.5-pro
    apiBase: https://api.githubcopilot.com/
    roles:
      - chat
      - edit
      - apply
    capabilities:
      - tool_use
      - image_input

  # ── Autocomplete (inline completions) ────────────────────────────────────
  - name: "Copilot Autocomplete"
    provider: github-copilot
    model: gpt-4o-mini
    apiBase: https://api.githubcopilot.com/
    roles:
      - autocomplete

  # ─── Oracle Code Assist (OCA) ─────────────────────────────────────────────
  # provider: oca
  #   Talks directly to Oracle's LiteLLM HTTPS endpoint.
  #   Token is read from ~/.codex/oca-secrets.json at runtime.
  #   No apiKey field needed in the config — the provider resolves it itself.

  # ── OCA: gpt-5.3-codex ───────────────────────────────────────────────────
  - name: "OCA: gpt-5.3-codex"
    provider: oca
    model: oca/gpt-5.3-codex
    apiBase: https://code-internal.aiservice.us-chicago-1.oci.oraclecloud.com/20250206/app/litellm/v1/
    roles:
      - chat
      - edit
      - apply
    capabilities:
      - tool_use

  # ── OCA: gpt-4.1 ─────────────────────────────────────────────────────────
  - name: "OCA: gpt-4.1"
    provider: oca
    model: oca/gpt-4.1
    apiBase: https://code-internal.aiservice.us-chicago-1.oci.oraclecloud.com/20250206/app/litellm/v1/
    roles:
      - chat
      - edit
      - apply
      - summarize
    capabilities:
      - tool_use

  # ── OCA: gpt-4o ──────────────────────────────────────────────────────────
  - name: "OCA: gpt-4o"
    provider: oca
    model: oca/gpt-4o
    apiBase: https://code-internal.aiservice.us-chicago-1.oci.oraclecloud.com/20250206/app/litellm/v1/
    roles:
      - chat
      - edit
      - apply
    capabilities:
      - tool_use

  # ── OCA Autocomplete ──────────────────────────────────────────────────────
  - name: "OCA Autocomplete"
    provider: oca
    model: oca/gpt-4o-mini
    apiBase: https://code-internal.aiservice.us-chicago-1.oci.oraclecloud.com/20250206/app/litellm/v1/
    roles:
      - autocomplete

# ─── Context providers ────────────────────────────────────────────────────
context:
  - provider: code
  - provider: docs
  - provider: diff
  - provider: terminal
  - provider: problems
  - provider: folder
  - provider: codebase

# ─── Rules ────────────────────────────────────────────────────────────────
rules:
  - You are a precise software engineering assistant. Think carefully before making changes.
  - Prefer minimal, targeted edits. Always explain your reasoning concisely.
  - When using tools, be explicit about which file and line you are editing.

# ─── Env var injection ────────────────────────────────────────────────────
# OCA_API_KEY is loaded from ~/.continue/.env if the oca-secrets.json file
# is absent.  After logging in with codex-oca-temp.sh this env var is not
# needed — the provider reads the secrets file directly.
env:
  - OCA_API_KEY

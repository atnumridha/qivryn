name: Qivryn IDE Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*-qivryn-ide"

concurrency:
  group: qivryn-ide-installers-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    continue-on-error: ${{ matrix.experimental }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            platform: darwin
            arch: x64
            npm_config_arch: x64
            gulp_task: vscode-darwin-x64
            experimental: false
          - os: macos-latest
            platform: darwin
            arch: arm64
            npm_config_arch: arm64
            gulp_task: vscode-darwin-arm64
            experimental: false
          - os: ubuntu-latest
            platform: linux
            arch: x64
            npm_config_arch: x64
            gulp_task: vscode-linux-x64
            experimental: false
          - os: ubuntu-latest
            platform: linux
            arch: arm64
            npm_config_arch: arm64
            gulp_task: vscode-linux-arm64
            experimental: false
          - os: windows-latest
            platform: win32
            arch: x64
            npm_config_arch: x64
            gulp_task: vscode-win32-x64
            experimental: false
          - os: windows-latest
            platform: win32
            arch: arm64
            npm_config_arch: arm
            gulp_task: vscode-win32-arm64
            experimental: true

    env:
      QIVRYN_VSCODE_TARGET: ${{ matrix.platform }}-${{ matrix.arch }}
      npm_config_arch: ${{ matrix.npm_config_arch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Build target-specific Qivryn VSIX
        uses: ./.github/actions/build-vscode-extension
        with:
          platform: ${{ matrix.platform }}
          arch: ${{ matrix.arch }}
          npm_config_arch: ${{ matrix.npm_config_arch }}
          pre-release: false
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Qivryn IDE source tree
        shell: bash
        run: npm run ide:prepare -- --skip-extension-build

      - name: Install Code OSS build dependencies
        shell: bash
        working-directory: ide/.build/vscode
        run: npm ci

      - name: Build Qivryn IDE app bundle
        shell: bash
        run: node ide/scripts/run-upstream.mjs npx gulp ${{ matrix.gulp_task }}

      - name: Install Linux packaging tools
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot rpm dpkg-dev

      - name: Build Linux DEB and RPM installers
        if: matrix.platform == 'linux'
        continue-on-error: true
        shell: bash
        env:
          STRIP: /bin/true
        run: |
          node ide/scripts/run-upstream.mjs npx gulp vscode-linux-${{ matrix.arch }}-prepare-deb
          node ide/scripts/run-upstream.mjs npx gulp vscode-linux-${{ matrix.arch }}-build-deb
          node ide/scripts/run-upstream.mjs npx gulp vscode-linux-${{ matrix.arch }}-prepare-rpm
          node ide/scripts/run-upstream.mjs npx gulp vscode-linux-${{ matrix.arch }}-build-rpm

      - name: Build Windows setup installers
        if: matrix.platform == 'win32'
        continue-on-error: true
        shell: bash
        run: |
          node ide/scripts/run-upstream.mjs npx gulp vscode-win32-${{ matrix.arch }}-system-setup
          node ide/scripts/run-upstream.mjs npx gulp vscode-win32-${{ matrix.arch }}-user-setup

      - name: Package installer artifacts
        shell: bash
        run: |
          node ide/scripts/package-artifacts.mjs \
            --platform ${{ matrix.platform }} \
            --arch ${{ matrix.arch }} \
            --out-dir ide/.build/installers

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v7
        with:
          name: qivryn-ide-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            ide/.build/installers/*

  release:
    name: Publish installer release assets
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: qivryn-ide-*
          path: installer-artifacts
          merge-multiple: true

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            installer-artifacts/*
          prerelease: true
          token: ${{ secrets.CI_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

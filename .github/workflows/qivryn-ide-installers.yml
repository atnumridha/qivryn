name: Qivryn IDE Installers

on:
  workflow_dispatch:

concurrency:
  group: qivryn-ide-installers-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    continue-on-error: ${{ matrix.experimental }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            platform: darwin
            arch: x64
            npm_config_arch: x64
            gulp_task: vscode-darwin-x64
            experimental: false
          - os: macos-14
            platform: darwin
            arch: arm64
            npm_config_arch: arm64
            gulp_task: vscode-darwin-arm64
            experimental: false
          - os: ubuntu-latest
            platform: linux
            arch: x64
            npm_config_arch: x64
            gulp_task: vscode-linux-x64
            experimental: false
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            npm_config_arch: arm64
            gulp_task: vscode-linux-arm64
            experimental: false
          - os: windows-latest
            platform: win32
            arch: x64
            npm_config_arch: x64
            gulp_task: vscode-win32-x64
            experimental: false
          - os: windows-latest
            platform: win32
            arch: arm64
            npm_config_arch: arm64
            gulp_task: vscode-win32-arm64
            experimental: true

    env:
      QIVRYN_VSCODE_TARGET: ${{ matrix.platform }}-${{ matrix.arch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Qivryn's native extension dependencies are built against Node 20.
          node-version-file: ".nvmrc"

      - name: Build shared Qivryn packages
        shell: bash
        run: node ./scripts/build-packages.js

      - name: Install extension dependencies
        shell: bash
        working-directory: extensions/vscode
        run: npm ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install CLI dependencies
        shell: bash
        working-directory: extensions/cli
        run: npm ci --include=optional --ignore-scripts

      # The CLI bundle imports Core source directly.  Install and compile Core
      # before bundling the CLI so esbuild can resolve Core's dependencies.
      - name: Install Core dependencies
        shell: bash
        working-directory: core
        run: npm ci

      - name: Build Core
        shell: bash
        working-directory: core
        run: npm run build

      - name: Build CLI
        shell: bash
        working-directory: extensions/cli
        run: npm run build

      - name: Install GUI dependencies
        shell: bash
        working-directory: gui
        run: npm ci

      - name: Build GUI
        shell: bash
        working-directory: gui
        run: npm run build --max-old-space-size=4096
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Prepare Qivryn IDE source tree
        shell: bash
        run: npm run ide:prepare

      - name: Install Linux native build dependencies
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libkrb5-dev libx11-dev libxkbfile-dev pkg-config

      - name: Set up Node.js for Code OSS
        uses: actions/setup-node@v4
        with:
          # Code - OSS 1.127's preinstall script requires Node 24.
          node-version: "24"

      - name: Install Code OSS build dependencies
        shell: bash
        working-directory: ide/.build/vscode
        run: npm ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Qivryn IDE app bundle
        shell: bash
        run: node ide/scripts/run-upstream.mjs npx gulp ${{ matrix.gulp_task }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify packaged update and recovery controls
        shell: bash
        run: |
          node ide/scripts/verify-packaged-recovery.mjs \
            --platform ${{ matrix.platform }} \
            --arch ${{ matrix.arch }} \
            --output ide/.build/acceptance/recovery-${{ matrix.platform }}-${{ matrix.arch }}.json

      - name: Install Linux packaging tools
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot rpm dpkg-dev

      - name: Build Linux DEB and RPM installers
        if: matrix.platform == 'linux'
        continue-on-error: true
        shell: bash
        env:
          STRIP: /bin/true
        run: |
          node ide/scripts/run-upstream.mjs npx gulp vscode-linux-${{ matrix.arch }}-prepare-deb
          node ide/scripts/run-upstream.mjs npx gulp vscode-linux-${{ matrix.arch }}-build-deb
          node ide/scripts/run-upstream.mjs npx gulp vscode-linux-${{ matrix.arch }}-prepare-rpm
          node ide/scripts/run-upstream.mjs npx gulp vscode-linux-${{ matrix.arch }}-build-rpm

      - name: Build Windows setup installers
        if: matrix.platform == 'win32'
        continue-on-error: true
        shell: bash
        run: |
          node ide/scripts/run-upstream.mjs npx gulp vscode-win32-${{ matrix.arch }}-system-setup
          node ide/scripts/run-upstream.mjs npx gulp vscode-win32-${{ matrix.arch }}-user-setup

      - name: Package installer artifacts
        shell: bash
        run: |
          node ide/scripts/package-artifacts.mjs \
            --platform ${{ matrix.platform }} \
            --arch ${{ matrix.arch }} \
            --out-dir ide/.build/installers

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qivryn-ide-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            ide/.build/installers/*
            ide/.build/acceptance/recovery-${{ matrix.platform }}-${{ matrix.arch }}.json
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish installer release assets
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: qivryn-ide-*
          path: installer-artifacts
          merge-multiple: true

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            installer-artifacts/*
          prerelease: true
          token: ${{ secrets.CI_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

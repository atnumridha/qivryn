name: Daily Snyk Agent

on:
  schedule:
    # Runs at 9:00 AM UTC every day
    - cron: "0 9 * * *"
  workflow_dispatch: # Allows manual triggering

jobs:
  run-qivryn-task:
    runs-on: ubuntu-latest
    # Only run this workflow on the main repository (atnumridha/qivryn)
    if: github.repository == 'qivryn/qivryn'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install Qivryn CLI globally
        run: npm install -g @qivryn/cli@latest

      - name: Run Snyk Agent
        run: cd extensions/cli && qivryn -p --agent qivryn/snyk-code-scan-agent "The current directory"
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          QIVRYN_API_KEY: ${{ secrets.QIVRYN_API_KEY }}

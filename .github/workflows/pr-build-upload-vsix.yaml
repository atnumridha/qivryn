name: Build And Upload VSIX

# Builds and uploads VS Code VSIX artifacts across Linux, Windows, and macOS ARM platforms.
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - chrome-vscode-extension-separation
    paths:
      - ".github/actions/build-vscode-extension/action.yml"
      - ".github/workflows/pr-build-upload-vsix.yaml"
      - ".nvmrc"
      - "core/**"
      - "extensions/cli/**"
      - "extensions/vscode/**"
      - "gui/**"
      - "packages/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
  pull_request:
    branches:
      - main

jobs:
  build-and-upload-vsix:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      matrix:
        include:
          - platform: linux
            arch: x64
            runner: ubuntu-latest
          - platform: win32
            arch: x64
            runner: windows-latest
          - platform: darwin
            arch: arm64
            runner: macos-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build VS Code extension
        uses: ./.github/actions/build-vscode-extension
        with:
          platform: ${{ matrix.platform }}
          arch: ${{ matrix.arch }}
          npm_config_arch: ${{ matrix.arch }}
          pre-release: false
          commit-sha: ${{ github.sha }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: vscode-extension-build-${{ matrix.platform }}-${{ matrix.arch }}
          path: extensions/vscode/build
          if-no-files-found: error
          retention-days: 14

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}-vsix
          path: "extensions/vscode/*.vsix"
          if-no-files-found: error
          retention-days: 14

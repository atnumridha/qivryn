name: Weekly Qivryn Task

on:
  schedule:
    # Runs at 8/9:30 AM PST (16:30 UTC) every Monday so PR shows up at beginning of week
    - cron: "30 16 * * 1"
  workflow_dispatch: # Allows manual triggering

jobs:
  run-qivryn-task:
    # Only run this workflow on the main repository (atnumridha/qivryn)
    if: github.repository == 'qivryn/qivryn'
    uses: ./.github/workflows/run-qivryn-agent.yml
    with:
      agent: qivryn/tidy-up-markdown-agent
      branch_name: main
    secrets:
      QIVRYN_API_KEY: ${{ secrets.QIVRYN_API_KEY }}
